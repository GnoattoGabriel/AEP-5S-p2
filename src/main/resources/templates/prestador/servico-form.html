<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Cadastrar Serviço')}"></head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <div class="md:pl-64 flex flex-col flex-1 min-h-screen">
        
        <div th:replace="~{fragments/layout :: header('Cadastrar Serviço')}"></div>

        <main class="p-6 md:p-8 flex-grow max-w-3xl mx-auto w-full">
            
            <div class="mb-8">
                <h3 class="text-2xl font-extrabold text-slate-900 tracking-tight">Cadastrar Novo Serviço</h3>
                <p class="text-slate-500 text-sm">Preencha os dados abaixo para adicionar um serviço ao catálogo.</p>
            </div>

            <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 md:p-8">
                <form action="/prestador/servicos/cadastrar" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Nome do Serviço</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                    <i data-lucide="wrench" class="w-4 h-4"></i>
                                </span>
                                <input type="text" name="nome" required placeholder="Ex: Pintura Residencial"
                                       class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all text-slate-800">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Categoria</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                    <i data-lucide="tag" class="w-4 h-4"></i>
                                </span>
                                <select name="categoria" required
                                        class="w-full pl-10 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all text-slate-800 appearance-none">
                                    <option value="" disabled selected>Selecione uma categoria</option>
                                    <option value="Reformas">Reformas</option>
                                    <option value="Assistência Técnica">Assistência Técnica</option>
                                    <option value="Limpeza">Limpeza</option>
                                    <option value="Design">Design</option>
                                    <option value="Pet">Pet</option>
                                    <option value="Outros">Outros</option>
                                </select>
                                <span class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400">
                                    <i data-lucide="chevron-down" class="w-4 h-4"></i>
                                </span>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Nome do Profissional</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                    <i data-lucide="user" class="w-4 h-4"></i>
                                </span>
                                <input type="text" name="profissional" required placeholder="Seu nome completo"
                                       class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all text-slate-800">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Valor Estimado (R$)</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                    <i data-lucide="dollar-sign" class="w-4 h-4"></i>
                                </span>
                                <input type="number" name="valor" required step="0.01" min="0" placeholder="Ex: 250.00"
                                       class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all text-slate-800">
                            </div>
                        </div>

                        <div class="pt-4 flex justify-end gap-3">
                            <a href="/prestador/servicos" class="px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-sm rounded-xl transition-all">
                                <span>Cancelar</span>
                            </a>
                            <button type="submit" class="px-8 py-3 bg-brand-600 hover:bg-brand-700 text-white font-bold text-sm rounded-xl transition-all shadow-lg shadow-brand-500/20 flex items-center justify-center gap-2">
                                <i data-lucide="save" class="w-4 h-4"></i>
                                <span>Cadastrar Serviço</span>
                            </button>
                        </div>
                    </div>
                </form>
            </div>

        </main>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }
        document.addEventListener("DOMContentLoaded", function() {
            lucide.createIcons();
        });
    </script>
</body>
</html>
