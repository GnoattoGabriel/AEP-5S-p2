<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ConectaLocal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5',
                            700: '#4338ca', 800: '#3730a3', 900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-brand-600 text-white shadow-lg shadow-brand-500/30 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-900">ConectaLocal</h1>
            <p class="text-sm text-slate-500 mt-1">Acesse sua conta</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-8">
            <div th:if="${param.error}" class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl">
                Email ou senha inválidos.
            </div>
            <div th:if="${param.logout}" class="mb-4 p-3 bg-green-50 border border-green-200 text-green-700 text-sm rounded-xl">
                Você saiu da sua conta.
            </div>
            <div th:if="${param.cadastro}" class="mb-4 p-3 bg-green-50 border border-green-200 text-green-700 text-sm rounded-xl">
                Conta criada com sucesso! Faça login.
            </div>

            <form action="/login" method="post" class="space-y-5"
                  onsubmit="document.getElementById('uf').value=document.getElementById('em').value+'::'+document.querySelector('[name=rl]:checked').value">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="username" id="uf">
                <div>
                    <label for="em" class="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
                    <input type="text" id="em" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all">
                </div>
                <div>
                    <label for="se" class="block text-sm font-semibold text-slate-700 mb-1.5">Senha</label>
                    <input type="password" id="se" name="senha" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Tipo de conta</label>
                    <div class="flex gap-3">
                        <label class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-xl border border-slate-300 cursor-pointer has-[:checked]:bg-brand-50 has-[:checked]:border-brand-500 has-[:checked]:text-brand-700 transition-all text-sm font-medium text-slate-600">
                            <input type="radio" name="rl" value="CLIENTE" checked class="sr-only">
                            Cliente
                        </label>
                        <label class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-xl border border-slate-300 cursor-pointer has-[:checked]:bg-brand-50 has-[:checked]:border-brand-500 has-[:checked]:text-brand-700 transition-all text-sm font-medium text-slate-600">
                            <input type="radio" name="rl" value="PRESTADOR" class="sr-only">
                            Prestador
                        </label>
                    </div>
                </div>
                <button type="submit"
                    class="w-full py-3 px-4 bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-xl transition-all shadow-md shadow-brand-500/20">
                    Entrar
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-slate-500">
                Não tem conta?
                <a href="/cadastro" class="text-brand-600 hover:text-brand-700 font-semibold">Cadastre-se</a>
            </p>
        </div>
    </div>
</body>
</html>
