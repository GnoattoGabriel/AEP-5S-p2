<div th:if="${tipoUsuario == 'PRESTADOR'}">
    <div class="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
        <h4 class="text-sm font-bold text-slate-900">Notifica&ccedil;&otilde;es</h4>
        <span class="text-[10px] font-bold text-rose-600 bg-rose-50 px-2 py-0.5 rounded-full" th:text="${countPendentes} + ' pendentes'">0 pendentes</span>
    </div>
    <div class="max-h-72 overflow-y-auto">
        <div th:each="s : ${pendentes}" class="px-4 py-3 border-b border-slate-50 hover:bg-slate-50 transition-colors">
            <div class="flex items-start gap-3">
                <div class="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center shrink-0 mt-0.5">
                    <i data-lucide="clock" class="w-4 h-4 text-amber-600"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-semibold text-slate-900 truncate" th:text="${s.nomeCliente}">Cliente</p>
                    <p class="text-xs text-slate-500 truncate" th:text="${s.servico.nome}">Servi&ccedil;o</p>
                    <p class="text-[10px] text-slate-400 mt-0.5" th:text="${#temporals.format(s.dataCriacao, 'dd/MM/yyyy HH:mm')}">Data</p>
                </div>
                <span class="text-[10px] font-bold text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full shrink-0 self-start">PENDENTE</span>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(pendentes)}" class="px-4 py-8 text-center">
            <i data-lucide="bell-off" class="w-8 h-8 text-slate-300 mx-auto mb-2"></i>
            <p class="text-sm text-slate-400">Nenhuma notifica&ccedil;&atilde;o pendente</p>
        </div>
    </div>
</div>
<div th:if="${tipoUsuario == 'CLIENTE'}">
    <div class="px-4 py-3 border-b border-slate-100">
        <h4 class="text-sm font-bold text-slate-900">&Uacute;ltimas Solicita&ccedil;&otilde;es</h4>
    </div>
    <div class="max-h-72 overflow-y-auto">
        <div th:each="s : ${recentes}" class="px-4 py-3 border-b border-slate-50 hover:bg-slate-50 transition-colors">
            <div class="flex items-start gap-3">
                <div th:if="${s.status == T(com.aep.servicos.model.SolicitacaoStatus).FINALIZADA}" class="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center shrink-0 mt-0.5">
                    <i data-lucide="file-text" class="w-4 h-4 text-emerald-600"></i>
                </div>
                <div th:if="${s.status == T(com.aep.servicos.model.SolicitacaoStatus).CANCELADA}" class="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center shrink-0 mt-0.5">
                    <i data-lucide="file-text" class="w-4 h-4 text-red-600"></i>
                </div>
                <div th:if="${s.status != T(com.aep.servicos.model.SolicitacaoStatus).FINALIZADA and s.status != T(com.aep.servicos.model.SolicitacaoStatus).CANCELADA}" class="w-8 h-8 rounded-full bg-brand-100 flex items-center justify-center shrink-0 mt-0.5">
                    <i data-lucide="file-text" class="w-4 h-4 text-brand-600"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-semibold text-slate-900 truncate" th:text="${s.servico.nome}">Servi&ccedil;o</p>
                    <p class="text-[10px] text-slate-400" th:text="'Protocolo: ' + ${s.protocolo}">Protocolo</p>
                </div>
                <span th:if="${s.status == T(com.aep.servicos.model.SolicitacaoStatus).FINALIZADA}" class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full shrink-0 self-start">FINALIZADA</span>
                <span th:if="${s.status == T(com.aep.servicos.model.SolicitacaoStatus).CANCELADA}" class="text-[10px] font-bold text-red-600 bg-red-50 px-2 py-0.5 rounded-full shrink-0 self-start">CANCELADA</span>
                <span th:if="${s.status == T(com.aep.servicos.model.SolicitacaoStatus).EM_ANDAMENTO}" class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full shrink-0 self-start">EM ANDAMENTO</span>
                <span th:if="${s.status == T(com.aep.servicos.model.SolicitacaoStatus).PENDENTE}" class="text-[10px] font-bold text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full shrink-0 self-start">PENDENTE</span>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(recentes)}" class="px-4 py-8 text-center">
            <i data-lucide="bell-off" class="w-8 h-8 text-slate-300 mx-auto mb-2"></i>
            <p class="text-sm text-slate-400">Nenhuma solicita&ccedil;&atilde;o encontrada</p>
        </div>
    </div>
</div>
